<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flora Focus</title>
<style>
body{font-family:'Segoe UI',sans-serif;text-align:center;background:linear-gradient(#e8f5e9,#c8e6c9);margin:0}
.container{max-width:520px;margin:auto;padding:16px;position:relative}
h1{margin:8px 0}
input,select,button{padding:10px;border-radius:12px;border:none;margin:5px}
button{background:#2e7d32;color:#fff;cursor:pointer}
.timer{font-size:2.4em;margin:10px}
.status{font-size:1.2em;font-weight:bold;margin:8px}
.work{color:#1b5e20}
.rest{color:#0d47a1}
.scene{position:relative;height:200px}
.plant{position:absolute;bottom:0;left:50%;transform:translateX(-50%) scale(.3);transition:2s;font-size:90px}
.grow1{transform:translateX(-50%) scale(.5)}
.grow2{transform:translateX(-50%) scale(.7)}
.grow3{transform:translateX(-50%) scale(.9)}
.grow4{transform:translateX(-50%) scale(1)}
label{display:block;margin-top:8px;font-size:0.95em}
footer{font-size:0.75em;margin-top:20px;opacity:0.7}
.lang{position:absolute;top:10px;right:10px;}
.lang button{background:none;border:none;font-size:20px;cursor:pointer;}
</style>
</head>
<body>
<div class="container">

<div class="lang">
  <button onclick="setLanguage('es')">🇪🇸</button>
  <button onclick="setLanguage('en')">🇺🇸</button>
</div>

<h1>🌿 Flora Focus</h1>

<label id="lblWork">⏱ Tiempo de trabajo (min)</label>
<input id="workTime" type="number" value="25" min="1">

<label id="lblBreak">💧 Tiempo de descanso (min)</label>
<input id="breakTime" type="number" value="5" min="1">

<label id="lblCycles">🔁 Ciclos</label>
<input id="cycles" type="number" value="4" min="1"><br>

<select id="volume">
<option value="0.1">Bajo</option>
<option value="0.3" selected>Medio</option>
<option value="0.6">Alto</option>
</select>

<label>
  <input type="checkbox" id="soundToggle" checked>
  <span id="soundText">Señal auditiva</span>
</label><br>

<button id="btnStart" onclick="start()">Comenzar</button>
<button id="btnStop" onclick="stop()">Detener</button>

<div class="timer" id="timer">00:00</div>
<div id="status" class="status"></div>

<div class="scene">
<div id="plant" class="plant">🌱</div>
</div>

<footer>Autoría: Jésica Favara</footer>

</div>

<script>
const $ = id => document.getElementById(id);
let audioCtx=null;

function beep(freq=600,duration=0.1){
  if(!$('soundToggle').checked) return;
  if(!audioCtx){
    audioCtx=new (window.AudioContext||window.webkitAudioContext)();
  }
  const osc=audioCtx.createOscillator();
  const gain=audioCtx.createGain();
  osc.frequency.value=freq;
  gain.gain.value=parseFloat($('volume').value);
  osc.connect(gain);
  gain.connect(audioCtx.destination);
  osc.start();
  osc.stop(audioCtx.currentTime+duration);
}

function tick(){beep(isWork?600:400,0.05)}

const translations={
  es:{work:"⏱ Tiempo de trabajo",rest:"💧 Tiempo de descanso",cycles:"🔁 Ciclos",start:"Comenzar",stop:"Detener",sound:"Señal auditiva",working:"🌿 TRABAJO",resting:"💧 DESCANSO",done:"🌸 Completado",stopped:"⏹ Detenido"},
  en:{work:"⏱ Work time",rest:"💧 Break time",cycles:"🔁 Cycles",start:"Start",stop:"Stop",sound:"Sound",working:"🌿 WORK",resting:"💧 BREAK",done:"🌸 Completed",stopped:"⏹ Stopped"}
};

let currentLang="es";

function setLanguage(lang){
  currentLang=lang;
  let t=translations[lang];
  $('lblWork').innerText=t.work;
  $('lblBreak').innerText=t.rest;
  $('lblCycles').innerText=t.cycles;
  $('btnStart').innerText=t.start;
  $('btnStop').innerText=t.stop;
  $('soundText').innerText=t.sound;
  updateStatus();
}

let work,rest,total,cycle=0,isWork=true,interval,growth=0,endTime=0;

function start(){
  work=$('workTime').value*60;
  rest=$('breakTime').value*60;
  total=$('cycles').value;
  if(!work||!rest||!total)return alert("Datos inválidos");
  stop();
  cycle=0;isWork=true;growth=0;
  run(work);
}

function run(d){
  endTime=Date.now()+d*1000;
  updateStatus();
  interval=setInterval(()=>{
    let r=Math.max(0,Math.floor((endTime-Date.now())/1000));
    $('timer').innerText=String(Math.floor(r/60)).padStart(2,'0')+":"+String(r%60).padStart(2,'0');
    tick();
    if(isWork){
      let step=Math.floor(d/4)||1;
      if(r%step===0&&growth<4){
        growth++;
        $('plant').className='plant grow'+growth;
        if(growth===4)$('plant').innerText='🌸';
      }
    }
    if(r<=0){
      clearInterval(interval);
      beep(800,0.1);
      if(isWork){isWork=false;run(rest);}
      else{
        cycle++;
        if(cycle>=total){$('status').innerText=translations[currentLang].done;return;}
        resetPlant();
        isWork=true;
        run(work);
      }
    }
  },1000);
}

function stop(){
  clearInterval(interval);
  $('status').innerText=translations[currentLang].stopped;
}

function updateStatus(){
  $('status').innerText=isWork?translations[currentLang].working:translations[currentLang].resting;
}

function resetPlant(){
  growth=0;
  $('plant').className='plant';
  $('plant').innerText='🌱';
}
</script>
</body>
</html>
